name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check JS syntax
        run: npx eslint src/**/*.js --no-eslintrc --format json || true
        continue-on-error: true
        
      - name: Check CSS syntax
        run: find src -name "*.css" -exec npx stylelint {} \; || true
        continue-on-error: true