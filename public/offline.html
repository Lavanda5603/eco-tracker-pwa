<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Нет соединения</title>
  <style>
    :root {
      --green: #0f5b4c;
      --mint: #61cdb3;
      --bg: #f4f4ef;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--green);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .offline-container {
      max-width: 400px;
      padding: 40px 20px;
    }
    .brand-mark {
      width: 60px;
      height: 60px;
      background: var(--mint);
      border-radius: 50%;
      margin: 0 auto 24px;
      position: relative;
    }
    .brand-mark::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 32px;
      background: var(--green);
      left: 22px;
      top: 16px;
      border-radius: 8px;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      width: 36px;
      height: 20px;
      background: var(--green);
      left: 12px;
      top: 10px;
      border-radius: 20px 20px 4px 4px;
    }
    h1 { font-size: 32px; margin-bottom: 16px; color: var(--green); }
    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 32px;
      color: #235f53;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: var(--mint);
      color: var(--green);
      text-decoration: none;
      border-radius: 40px;
      font-weight: bold;
      font-size: 18px;
      border: 2px solid transparent;
    }
    .btn:hover {
      background: transparent;
      border-color: var(--mint);
      color: var(--mint);
    }
    .emoji { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="brand-mark"></div>
    <div class="emoji">🌱</div>
    <h1>Нет подключения</h1>
    <p>
      Похоже, вы потеряли соединение с интернетом.<br>
      Не волнуйтесь, как только связь восстановится,<br>
      приложение продолжит работу.
    </p>
    <a href="/" class="btn">Попробовать снова</a>
  </div>
</body>
</html>
